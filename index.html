<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Store — Painel</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/modal.css">
</head>
<body>

  <div id="toast-container"></div>

  <div class="app-shell">

    <!-- ══════════════ SIDEBAR ══════════════ -->
    <aside class="sidebar">

      <div class="sidebar-logo">
        <div class="logo-icon">TS</div>
        <div>
          <div class="logo-text">Tech Store</div>
          <div class="logo-sub">Sistema de Gestão</div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-label">Geral</div>
        <button class="nav-item" data-page="dashboard">
          <span class="nav-icon">📊</span> Dashboard
        </button>

        <div class="nav-section-label">Operações</div>
        <button class="nav-item" data-page="vendas">
          <span class="nav-icon">🛒</span> Vendas
        </button>
        <button class="nav-item" data-page="produtos">
          <span class="nav-icon">📦</span> Produtos
        </button>
        <button class="nav-item" data-page="clientes">
          <span class="nav-icon">👤</span> Clientes
        </button>

        <div class="nav-section-label">Administração</div>
        <button class="nav-item" data-page="funcionarios">
          <span class="nav-icon">🧑‍💼</span> Funcionários
        </button>
        <button class="nav-item" data-page="empresas">
          <span class="nav-icon">🏢</span> Empresas
        </button>
        <button class="nav-item" data-page="fornecedores">
          <span class="nav-icon">🚚</span> Fornecedores
        </button>
        <button class="nav-item" data-page="categorias">
          <span class="nav-icon">🏷️</span> Categorias
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="user-avatar">?</div>
          <div style="min-width:0">
            <div class="user-name" id="user-name">Usuário</div>
            <div class="user-role" id="user-role">Carregando...</div>
          </div>
        </div>
        <button class="btn btn-logout btn-sm" id="btn-logout">🚪 Sair</button>
      </div>

    </aside>

    <!-- ══════════════ MAIN ══════════════ -->
    <div class="main-content">

      <!-- Topbar -->
      <header class="topbar">
        <div style="display:flex;align-items:center;gap:.75rem">
          <button class="hamburger" id="hamburger" aria-label="Menu">☰</button>
          <span class="topbar-title" id="topbar-title">Dashboard</span>
        </div>
        <div class="topbar-actions">
          <div class="api-indicator">
            <div class="api-dot" id="api-status-dot"></div>
            <span id="api-status-label">verificando...</span>
          </div>
          <button class="btn btn-ghost btn-sm" id="btn-api-settings" title="Configurar URL da API">⚙️ API</button>
        </div>
      </header>

      <!-- Views — cada página renderiza dentro do seu div -->
      <main class="page-content">
        <div class="view-page" id="view-dashboard"></div>
        <div class="view-page" id="view-produtos"></div>
        <div class="view-page" id="view-clientes"></div>
        <div class="view-page" id="view-vendas"></div>
        <div class="view-page" id="view-funcionarios"></div>
        <div class="view-page" id="view-empresas"></div>
        <div class="view-page" id="view-fornecedores"></div>
        <div class="view-page" id="view-categorias"></div>
      </main>

    </div>
  </div>

  <!-- ══════════════ MODAL: Confirmar exclusão ══════════════ -->
  <div class="modal-overlay hidden" id="modal-confirm">
    <div class="modal" style="max-width:420px">
      <span class="modal-confirm-icon">🗑️</span>
      <h2>Confirmar exclusão</h2>
      <p id="confirm-text" style="color:var(--text-secondary);font-size:.9375rem;line-height:1.6;margin-bottom:0"></p>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="Modal.close('modal-confirm')">Cancelar</button>
        <button class="btn btn-danger"    id="confirm-ok">Excluir</button>
      </div>
    </div>
  </div>

  <!-- ══════════════ MODAL: Configurações da API ══════════════ -->
  <div class="modal-overlay hidden" id="modal-api-settings">
    <div class="modal" style="max-width:420px">
      <button class="modal-close" onclick="Modal.close('modal-api-settings')">✕</button>
      <h2>⚙️ Configurações da API</h2>
      <p style="color:var(--text-secondary);font-size:.875rem;margin-bottom:1.25rem">
        Informe a URL base do servidor Spring Boot.
      </p>
      <div class="form-group">
        <label>URL da API</label>
        <input class="form-control" id="api-url-input" type="url" placeholder="http://localhost:8080">
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="Modal.close('modal-api-settings')">Cancelar</button>
        <button class="btn btn-primary"   id="btn-save-api-url">Salvar</button>
      </div>
    </div>
  </div>

  <!-- ══════════════ SCRIPTS ══════════════ -->
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>

  <!-- Controllers — um arquivo por entidade -->
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/produtos.js"></script>
  <script src="js/pages/clientes.js"></script>
  <script src="js/pages/vendas.js"></script>
  <script src="js/pages/funcionarios.js"></script>
  <script src="js/pages/empresas.js"></script>
  <script src="js/pages/fornecedores.js"></script>
  <script src="js/pages/categorias.js"></script>

  <!-- Índice (Pages) e Router — devem vir APÓS os controllers -->
  <script src="js/pages.js"></script>
  <script src="js/router.js"></script>

  <script>
    // ── Guard: redirecionar se não autenticado ────────────────
    if (!sessionStorage.getItem('ts_logged')) {
      window.location.href = 'login.html';
    }

    // ── Preencher dados do funcionário logado na sidebar ──────
    (function populateUser() {
      const nome      = sessionStorage.getItem('ts_user_name')  || 'Usuário';
      const cargo     = sessionStorage.getItem('ts_user_cargo') || '';
      const nivel     = sessionStorage.getItem('ts_user_nivel') || '';
      const imagem    = sessionStorage.getItem('ts_user_imagem')|| '';
      const empresa   = sessionStorage.getItem('ts_empresa_nome')|| '';

      const primeiro  = nome.split(' ')[0];
      const iniciais  = nome.split(' ').filter(Boolean).map(p => p[0]).slice(0,2).join('').toUpperCase();

      // Avatar: foto real ou iniciais
      const avatarEl = document.getElementById('user-avatar');
      if (imagem) {
        avatarEl.innerHTML = `<img src="${imagem}" alt="${primeiro}"
          style="width:100%;height:100%;object-fit:cover;border-radius:50%;display:block">`;
      } else {
        avatarEl.textContent = iniciais || '?';
      }
      avatarEl.title = nome;

      document.getElementById('user-name').textContent = primeiro;

      // Role: cargo · empresa (ou nível de acesso como fallback)
      const roleEl = document.getElementById('user-role');
      if (cargo && empresa) {
        roleEl.textContent = `${cargo} · ${empresa}`;
      } else if (cargo) {
        roleEl.textContent = cargo;
      } else if (nivel) {
        roleEl.textContent = nivel;
      } else {
        roleEl.textContent = 'Funcionário';
      }
    })();

    // ── Logout ────────────────────────────────────────────────
    document.getElementById('btn-logout').addEventListener('click', () => {
      sessionStorage.clear();
      window.location.href = 'login.html';
    });

    // ── Inicializar roteador ──────────────────────────────────
    Router.init();
  </script>

</body>
</html>
