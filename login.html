<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Store — Login</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

  <div id="toast-container"></div>

  <div class="login-page">
    <div class="login-card">

      <div class="login-logo">
        <div class="login-logo-icon">TS</div>
        <div class="login-title">Tech Store</div>
        <div class="login-sub">Sistema de Gestão</div>
      </div>

      <div class="login-error" id="login-error"></div>

      <form class="login-form" id="form-login">
        <div class="form-group">
          <label for="login-user">Usuário</label>
          <input
            class="form-control"
            id="login-user"
            name="usuario"
            type="text"
            placeholder="seu.usuario"
            autocomplete="username"
            required
          >
        </div>
        <div class="form-group">
          <label for="login-pass">Senha</label>
          <input
            class="form-control"
            id="login-pass"
            name="senha"
            type="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          >
        </div>

        <div class="form-group" style="margin-top:.5rem">
          <label for="login-api-url">URL da API</label>
          <input
            class="form-control"
            id="login-api-url"
            type="url"
            placeholder="http://localhost:8080"
          >
        </div>

        <button class="btn btn-primary" type="submit" id="btn-login">
          Entrar
        </button>
      </form>

      <div class="login-hint">
        Acesso local — use qualquer usuário e senha.<br>
        A API deve estar em <code id="hint-url">http://localhost:8080</code>
      </div>

    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script>
    const savedUrl = API.getBaseURL();
    const urlInput = document.getElementById('login-api-url');
    urlInput.value = savedUrl;
    document.getElementById('hint-url').textContent = savedUrl;

    urlInput.addEventListener('change', () => {
      const v = urlInput.value.trim();
      if (v) {
        API.setBaseURL(v);
        document.getElementById('hint-url').textContent = v;
      }
    });

    document.getElementById('form-login').addEventListener('submit', async (e) => {
      e.preventDefault();

      // Save API URL before anything
      const apiUrl = urlInput.value.trim();
      if (apiUrl) API.setBaseURL(apiUrl);

      const btn = document.getElementById('btn-login');
      const errEl = document.getElementById('login-error');
      errEl.classList.remove('visible');
      setLoading(btn, true);

      try {
        // Check if API is reachable
        const online = await API.ping();
        if (!online) {
          throw new Error('Não foi possível conectar à API. Verifique se o servidor está rodando e a URL está correta.');
        }

        // Store "session" (local auth — the API doesn't have auth endpoint)
        const user = document.getElementById('login-user').value.trim();
        sessionStorage.setItem('ts_user', user);
        sessionStorage.setItem('ts_logged', '1');

        window.location.href = 'index.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.add('visible');
      } finally {
        setLoading(btn, false);
      }
    });
  </script>
</body>
</html>
